# 2D log-spaced scan of PARTICLE lock-in oscillator parameters
# Run with: /var/lib/cds-conda/base/envs/cds-testing/bin/python3 particle_lo_scan.py particle_lo_scan_params.yaml

# Scan grid (log-spaced)
cosgain_min: 2812
cosgain_max: 20000
cosgain_steps: 16   # increase for full runs (e.g. 8-10)

freq_min: 3000
freq_max: 9000
freq_steps: 4      # increase for full runs (e.g. 8-10)

# Timing
wait_time_freq: 60.0      # seconds to wait after a frequency change; TRAMP = wait_time_freq/2
wait_time_cosgain: 30.0   # seconds to wait when only COSGAIN changes; TRAMP = wait_time_cosgain/2
record_duration: 256.0    # seconds of NDS2 data to record per grid point

# NDS2 connection
nds2_server: "192.168.1.11"
nds2_port: 8088

# Channels to record (mixed sample rates handled automatically)
channels:
  - Y1:DMD-PARTICLE_Y_IN1         # 65536 Hz
  - Y1:DMD-PARTICLE_X_IN1         # 65536 Hz
  - Y1:DMD-PBSZ_IN1               # 65536 Hz
  - Y1:DMD-LESZ_SUM_IN1          # 65536 Hz
  - Y1:DMD-PARTICLE_Z_IN1         # 65536 Hz
  - Y1:DMD-LESZ_PIT_IN1           # 65536 Hz
  - Y1:DMD-LESZ_YAW_IN1
  - Y1:DMD-LESX_PIT_IN1
  - Y1:DMD-LESX_YAW_IN1
  - Y1:DMD-LESX_SUM_IN1
  - Y1:DMD-PARTICLE_CHARGE_OUT16  # 16 Hz
  - Y1:DMD-PARTICLE_PHI_OUT16     # 16 Hz

# Label appended to auto-generated run directory name
run_label: "cosfreq_scan"

# Root data directory (date/timestamp subdirectories created automatically)
output_root: "~/Dropbox/Microspheres/MAST-QG/worker1/data"
