# Configuration for measure_actuator_gain.py
#
# 2026-06-22 — Full 3-DOF (X, Y, Z), all four electrodes simultaneously.
# Z resonance is at ~10 Hz (Q~3, broad); guard band shifted to 15-25 Hz so
# Z tones at 10 Hz are placed below the exclusion zone.
#
# See scripts/dipole/README.md for method, pitfalls, and deployment notes.
# Resonance estimates (f0/Q) below are SEEDS; the script fits measured f0/Q
# from the response (for X/Y) and divides out the plant to get flat gains.

prefix: "Y1:DMD"
electrodes: ["E1", "E2", "E3", "E4"]   # -> Y1:DMD-POLES_E{n}_EXC

# Z is at ~10 Hz, broad (Q~3). Guard band shifted to 15-25 Hz so Z tones sit
# below the exclusion zone. X/Y remain well above it.
#
# fit_strategy per DOF:
#   x: dof_filtered  — complex fit restricted to X-intended tones (removes Y bleed)
#   y: mag_then_linear — magnitude-only f0/Q fit (immune to X-phase cross-coupling)
#   z: fit_plant: false — fix f0/Q at seed; only fit gains (sparse / low-SNR)
dofs:
  x:
    channel: "Y1:DMD-PARTICLE_X_IN1"
    f0: 39.0
    Q: 30.0
    n_tones: 8            # 8 tones / 4 electrodes = 2 per electrode
    tone_spacing_hz: 1.5
    fit_plant: true
    fit_strategy: dof_filtered
  y:
    channel: "Y1:DMD-PARTICLE_Y_IN1"
    f0: 54.0
    Q: 30.0
    n_tones: 8
    tone_spacing_hz: 1.5
    fit_plant: true
    fit_strategy: mag_then_linear
  z:
    channel: "Y1:DMD-PARTICLE_Z_IN1"
    f0: 10.0              # ~10 Hz; sits below the 15-25 Hz guard band
    Q: 3.0
    n_tones: 4            # sparse: one tone per electrode; f0/Q fixed at seed
    tone_spacing_hz: 0.6
    fit_plant: false

measurement_channel_rate: 65536    # PARTICLE_*_IN1 sample rate

frequency_plan:
  # Shifted up from 10-20 Hz to 15-25 Hz so Z tones at ~10 Hz are not excluded.
  # Z tones will be placed below 15 Hz; X/Y tones are well above 25 Hz.
  guard_band_hz: [15.0, 25.0]
  min_bin_separation: 3
  fft_bin_snap: true

amplitude:
  max_amplitude_counts: 100
  initial_amplitude_counts: 10
  amp_step_factor: 3.0

schroeder:
  enabled: true

trim:
  target_coherence: 0.5
  max_trim_iters: 5
  segment_s_max: 10

diag:
  template_xml: "/home/controls/Dropbox/Microspheres/MAST-QG/worker1/data/260611/actuators_sineResponse_template.xml"
  premeasure: {min_time_s: 10.0, cycles: 10, settling_frac: 0.1}
  measure:    {min_time_s: 10.0, cycles: 10, settling_frac: 0.1}
  rampup_s: 1.0
  rampdown_s: 1.0
  average_type: 0
  window: 1
  diag_timeout_s: 300

analysis:
  nds2_server: "192.168.1.11"
  nds2_port: 8088
  segment_s: 12
  n_averages: 30
  premeasure_n_averages: 3
  warmup_s: 3.0
  save_raw_capture: true

guard_monitor:
  nds2_server: "192.168.1.11"
  nds2_port: 8088
  channels: ["Y1:DMD-PARTICLE_X_IN1", "Y1:DMD-PARTICLE_Y_IN1", "Y1:DMD-PARTICLE_Z_IN1"]
  band_hz: [15.0, 25.0]   # shifted to match guard_band_hz above
  factor: 10000.0
  baseline_seconds: 10
  poll_seconds: 10

acts:
  enabled: false
  electrode_row:
    E1: 1
    E2: 2
    E3: 3
    E4: 4

safety:
  poles_assume_open_loop: true
  sw1_input_on_bit: 4
  sw2_output_on_bit: 1024
  restore_tramp_s: 2.0

abort:
  sentinel_path: "/tmp/abort_actuator_gain"

output_root: "/home/controls/Dropbox/Microspheres/MAST-QG/worker1/data"
run_label: "actgain_allDOF_allElec_260622"
