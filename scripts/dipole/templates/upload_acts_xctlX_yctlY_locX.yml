# ACTS upload: XCTL -> +x, YCTL -> +y, LOC -> +x
#
# Feedback mode: electrode columns for x/y particle feedback, plus the LOC
# probe along +x. spinC/spinS, ZCTL, LOS, RCTL are left uncoupled.
#
# Data: 260625 diamond2 actgain runs (xyDOF, E1..E4, 260622 config).
# Upload with: python3 upload_actuation_matrix.py --config <this file> [--dry-run]

prefix: "Y1:DMD"
matrix_name: "ACTS"

electrode_row:
  E1: 1
  E2: 2
  E3: 3
  E4: 4

electrodes: ["E1", "E2", "E3", "E4"]
dofs: ["x", "y"]

data:
  - {electrode: "E1", path: "$MQG_DROPBOX_PATH/worker1/data/260625/20260625_173818_actgain_xyDOF_E1_260622/actuator_gain_results.h5"}
  - {electrode: "E2", path: "$MQG_DROPBOX_PATH/worker1/data/260625/20260625_175619_actgain_xyDOF_E2_260622/actuator_gain_results.h5"}
  - {electrode: "E3", path: "$MQG_DROPBOX_PATH/worker1/data/260625/20260625_181409_actgain_xyDOF_E3_260622/actuator_gain_results.h5"}
  - {electrode: "E4", path: "$MQG_DROPBOX_PATH/worker1/data/260625/20260625_184741_actgain_xyDOF_E4_260622/actuator_gain_results.h5"}

gain_reduction: "signed_magnitude"
field_normalize: "common_gamma"
gamma_spread_warn: 0.20

field_anchor:
  mode: "self_norm"
  functional: "frobenius"
  physical_scale: 1.0

low_coherence_warn: 0.30
n_averages_for_error: 30
duplicate: "error"
strict_subspace: false
tramp_s: 5.0

columns:
  - {index: 1, label: "XCTL",  coupled: true,  angle_deg: 0,  gain: 1.0}
  - {index: 2, label: "YCTL",  coupled: true,  angle_deg: 90, gain: 1.0}
  - {index: 3, label: "ZCTL",  coupled: false}
  - {index: 4, label: "LOC",   coupled: true,  angle_deg: 0,  gain: 1.0}
  - {index: 5, label: "LOS",   coupled: true,  angle_deg: -90, gain: 1.0}
  - {index: 6, label: "spinC", coupled: true,  angle_deg: 0,   gain: 1.0}
  - {index: 7, label: "spinS", coupled: true,  angle_deg: -90, gain: 1.0}
  - {index: 8, label: "RCTL",  coupled: false}
